group 'zhuoyuan.li.fluttershareme'
version '1.0-SNAPSHOT'

plugins {
    id 'com.android.library' version '8.5.1'
}

repositories {
    google()
    mavenCentral()
}

android {
    namespace 'zhuoyuan.li.fluttershareme'
    compileSdk 35

    defaultConfig {
        minSdk 19
        targetSdk 35
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildFeatures {
        buildConfig false
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

dependencies {
    implementation 'com.facebook.android:facebook-share:18.0.3'
    // implementation 'com.twitter.sdk.android:twitter:3.1.1' //twitter share
}
